# =====================================================
# Painel de gestão do The Plasmik Report (Sveltia CMS)
# Cada coleção espelha o schema do site — o design é
# intocável a partir daqui, só se editam conteúdos.
# =====================================================

backend:
  name: github
  repo: jcpersonaltr-prog/jcpersonaltr-prog.github.io
  branch: main
  # Substitui pelo URL do teu Cloudflare Worker (ver GUIA-LANCAMENTO.md, Parte B):
  base_url: https://tiny-sunset-e57b.jcpersonaltr.workers.dev

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: relatorio
    label: Relatório
    label_singular: Edição
    folder: src/content/relatorio
    create: true
    extension: md
    format: frontmatter
    identifier_field: titulo
    summary: "Nº {{fields.numero}} — {{fields.titulo}}"
    fields:
      - { name: titulo, label: Título, widget: string }
      - { name: numero, label: Número da edição, widget: number, value_type: int, min: 1, hint: "A edição com o número mais alto aparece em destaque na homepage." }
      - { name: data, label: Data de publicação, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - { name: resumo, label: Resumo (uma frase), widget: string }
      - { name: tags, label: Tags, widget: list, required: false, default: [], hint: "Ex.: treino, saúde, truth uncovered" }
      - { name: body, label: Corpo da edição, widget: markdown }

  - name: tinta
    label: Tinta
    label_singular: Texto
    folder: src/content/tinta
    create: true
    extension: md
    format: frontmatter
    identifier_field: titulo
    summary: "{{fields.titulo}}"
    fields:
      - { name: titulo, label: Título, widget: string }
      - { name: data, label: Data, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - name: tipo
        label: Tipo de texto
        widget: select
        options:
          - { label: Reflexão, value: reflexao }
          - { label: Leafs From a Dead Tree, value: leafs }
          - { label: Princípio, value: principio }
      - { name: resumo, label: Resumo (opcional), widget: string, required: false }
      - { name: body, label: Texto, widget: markdown }

  - name: dados
    label: Treino & Media
    files:
      - name: videos
        label: Vídeos (página Media)
        file: src/data/videos.json
        fields:
          - name: videos
            label: Lista de vídeos
            widget: list
            summary: "{{fields.tipo}} — {{fields.titulo}}"
            fields:
              - { name: ytId, label: Link ou ID do YouTube, widget: string, hint: "Cola o link completo do YouTube (youtu.be/..., watch?v=..., Shorts) ou só o ID — ambos funcionam." }
              - { name: titulo, label: Título, widget: string }
              - { name: tipo, label: Tipo, widget: select, options: [Podcast, Clip] }

      - name: fitcards
        label: Fit Cards (página Treino)
        file: src/data/fitcards.json
        fields:
          - name: cards
            label: Cartões de treino
            widget: list
            summary: "{{fields.categoria}} — {{fields.titulo}}"
            fields:
              - { name: id, label: ID (único, sem espaços), widget: string }
              - { name: titulo, label: Título, widget: string }
              - { name: categoria, label: Categoria, widget: string, hint: "Os filtros criam-se sozinhos a partir das categorias existentes." }
              - { name: nivel, label: Nível, widget: select, options: [Iniciante, Intermédio, Avançado] }
              - { name: tempo, label: Duração, widget: string, hint: "Ex.: 35 min" }
              - { name: equipamento, label: Equipamento, widget: string }
              - name: exercicios
                label: Exercícios (nomes em inglês)
                widget: list
                summary: "{{fields.nome}} — {{fields.dose}}"
                fields:
                  - { name: nome, label: Exercício, widget: string }
                  - { name: dose, label: Séries/reps, widget: string, hint: "Ex.: 4 × 10" }


      - name: galeria
        label: Galeria (página Media)
        file: src/data/galeria.json
        fields:
          - name: itens
            label: Imagens da galeria
            widget: list
            summary: "{{fields.grupo}} — {{fields.imagem}}"
            fields:
              - { name: imagem, label: Imagem, widget: image }
              - { name: grupo, label: Grupo, widget: select, options: [Fotos, "Prop Art"], hint: "Fotos ganham tratamento P&B automático; Prop Art mantém as cores." }
              - { name: legenda, label: Legenda (opcional), widget: string, required: false }

      - name: desafios
        label: Desafios mensais (página Treino)
        file: src/data/desafios.json
        fields:
          - name: desafios
            label: Desafios
            widget: list
            summary: "{{fields.mes}} — {{fields.titulo}}"
            fields:
              - { name: mes, label: Mês, widget: string, hint: "Ex.: Julho 2026" }
              - { name: titulo, label: Nome do desafio, widget: string }
              - { name: regras, label: Regras, widget: text }
              - name: exercicios
                label: Exercícios
                widget: list
                fields:
                  - { name: nome, label: Exercício, widget: string }
                  - { name: dose, label: Dose diária, widget: string }
              - { name: atual, label: "É o desafio ativo?", widget: boolean, default: false, hint: "Só um desafio deve estar ativo de cada vez." }

  - name: paginas
    label: Páginas
    files:
      - name: homepage
        label: Homepage
        file: src/data/home.json
        fields:
          - { name: kicker, label: Etiqueta pequena (topo), widget: string }
          - { name: titulo, label: Título do manifesto, widget: text, hint: "Usa Enter para quebrar a linha." }
          - { name: lead, label: Texto de apresentação, widget: text }
          - { name: botaoEdicao, label: Texto do botão principal, widget: string }
          - { name: botaoComunidade, label: Texto do botão da comunidade, widget: string }
          - { name: foto, label: Fotografia principal, widget: image, hint: "Ideal em formato vertical 4:5 (ex.: 1200×1500). O tratamento P&B é automático." }
          - { name: fotoAlt, label: Descrição da foto (acessibilidade), widget: string }
          - { name: fotoLegenda, label: Legenda da foto, widget: string }
          - { name: fotoEnquadramento, label: Enquadramento da foto, widget: string, hint: "Abre a homepage com ?ajustar no fim do endereço, arrasta a foto até estar alinhada, e cola aqui o valor copiado." }
          - name: seccoes
            label: Cartões de secção
            widget: list
            summary: "{{fields.num}} — {{fields.titulo}}"
            fields:
              - { name: num, label: Número, widget: string }
              - { name: titulo, label: Título, widget: string }
              - { name: href, label: Link, widget: string, hint: "Só mudar se souberes o destino. Ex.: /treino/" }
              - { name: desc, label: Descrição, widget: text }

      - name: comunidade
        label: Página Comunidade
        file: src/data/comunidade.json
        fields:
          - { name: titulo, label: Título, widget: text, hint: "Enter quebra a linha." }
          - { name: lead, label: Texto de apresentação, widget: text }
          - { name: botao, label: Texto do botão, widget: string }
          - { name: whatsappLink, label: Link de convite do WhatsApp, widget: string }
          - { name: regrasTitulo, label: Título das regras, widget: string }
          - name: regras
            label: Regras
            widget: list
            summary: "{{fields.titulo}}"
            fields:
              - { name: titulo, label: Regra (negrito), widget: string }
              - { name: texto, label: Explicação, widget: text }

      - name: global
        label: Definições gerais (rodapé e loja)
        file: src/data/global.json
        fields:
          - { name: subscricaoFrase, label: Frase da subscrição (rodapé), widget: string }
          - { name: buttondownUsername, label: Username do Buttondown, widget: string }
          - { name: tagline, label: Tagline (rodapé), widget: string }
          - { name: lojaUrl, label: Link da Loja (menu), widget: string }
          - name: sociais
            label: Redes sociais (rodapé)
            widget: list
            summary: "{{fields.rotulo}}"
            fields:
              - { name: rotulo, label: Nome, widget: string }
              - { name: url, label: Link, widget: string }

      - name: textos
        label: Títulos das secções
        file: src/data/textos.json
        fields:
          - { name: relatorio, label: Relatório (arquivo), widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }
          - { name: tinta, label: Tinta, widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }
          - { name: treino, label: Treino (hub), widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }
          - { name: media, label: Media (hub), widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }
          - { name: fitcards, label: Fit Cards, widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }
          - { name: temporizador, label: Temporizador, widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }
          - { name: tabela, label: Tabela Nutricional, widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }
          - { name: desafios, label: Desafios, widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }
          - { name: videos, label: Vídeos, widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }
          - { name: galeria, label: Galeria, widget: object, fields: [{ name: titulo, label: Título, widget: string }, { name: lead, label: Subtítulo, widget: text }] }

      - name: loja
        label: Loja
        file: src/data/loja.json
        fields:
          - { name: titulo, label: Título da página, widget: string }
          - { name: lead, label: Texto de apresentação, widget: text }
          - name: itens
            label: Ofertas
            widget: list
            summary: "{{fields.tag}} — {{fields.titulo}}"
            fields:
              - { name: tag, label: Etiqueta, widget: string, hint: "Ex.: Pack, Programa, Promo", required: false }
              - { name: titulo, label: Título da oferta, widget: string }
              - { name: descricao, label: Descrição, widget: text }
              - { name: preco, label: Preço, widget: string, hint: "Texto livre: 49€, desde 30€/mês, Sob consulta…", required: false }
              - { name: imagem, label: Imagem, widget: image, required: false }
              - { name: botaoRotulo, label: Texto do botão, widget: string }
              - { name: botaoLink, label: Link do botão, widget: string, hint: "WhatsApp, email (mailto:...), página de pagamento — o que fizer sentido." }
              - { name: destaque, label: "Destacar (moldura âmbar)?", widget: boolean, default: false }

      - name: sobre
        label: Página Sobre
        file: src/data/sobre.json
        fields:
          - { name: titulo, label: Título da página, widget: string }
          - { name: biografia, label: Biografia, widget: text, hint: "Separa parágrafos com uma linha em branco. Usa **texto** para negrito." }
          - name: cartoes
            label: Cartões laterais
            widget: list
            summary: "{{fields.titulo}}"
            fields:
              - { name: titulo, label: Título do cartão, widget: string }
              - { name: texto, label: Texto, widget: text }
